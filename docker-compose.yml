services:
  monitor-site1:
    build: .
    environment:
      TARGET: "${TARGET_1}"
      WORDLIST: "${WORDLIST:-/wordlists/common.txt}"
      DISCORD_WEBHOOK: "${DISCORD_WEBHOOK}"
      STATE_FILE: "/data/site1-state.jsonl"
      SCAN_INTERVAL: "${SCAN_INTERVAL:-1h}"
      # AWS CloudFront can handle high volume; 150 workers is usually safe
      WORKERS: "150" 
      MATCH_CODES: "${MATCH_CODES:-200,301,302,403,401}"
      LOG_LEVEL: "info"
      # TARGETED: Focusing on JS environment, source maps, and common Node exposures
      EXTENSIONS: "js,json,env,map,bak,zip,txt"
      # Only GET. Nuxt routes often behave differently with HEAD vs GET
      METHOD: "GET"
    volumes:
      - ./wordlists:/wordlists:ro
      - monitor_data:/data
    restart: unless-stopped

